name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0). Leave empty to use 0.0.0-dev.'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag or input
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            if [[ -z "$VERSION" ]]; then
              VERSION="0.0.0-dev"
            fi
          else
            # Strip 'v' prefix from tag: v1.2.3 → 1.2.3
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Release version: $VERSION"

  build-macos:
    name: Build macOS
    runs-on: macos-14
    needs: resolve-version
    env:
      APP_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/UniviewCodeBuddyProxy/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('macos/UniviewCodeBuddyProxy/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Apple certificate (conditional)
        if: env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERT_BASE64" | base64 -o /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 \
            -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Extract signing identity for later use
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -n1 | awk -F'"' '{print $2}')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "🔐 Certificate imported, identity: $IDENTITY"

      - name: Build macOS app
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          chmod +x scripts/build-macos.sh
          bash scripts/build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniviewCodeBuddyProxy-macOS
          path: dist/UniviewCodeBuddyProxy-macOS.dmg
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]] && [[ -f "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f /tmp/certificate.p12

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: resolve-version
    env:
      APP_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build Windows app
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process
          .\scripts\build-windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniviewCodeBuddyProxy-Windows-x64
          path: dist/UniviewCodeBuddyProxy-Windows-x64.zip
          if-no-files-found: error

      - name: Upload Server CLI (Windows) artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebuddy-proxy-server-win-x64
          path: dist/codebuddy-proxy-server-win-x64.zip
          if-no-files-found: warn

      - name: Upload Server CLI (Linux) artifact
        uses: actions/upload-artifact@v4
        with:
          name: codebuddy-proxy-server-linux-x64
          path: dist/codebuddy-proxy-server-linux-x64.zip
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, build-macos, build-windows]
    env:
      APP_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            artifacts/UniviewCodeBuddyProxy-macOS/UniviewCodeBuddyProxy-macOS.dmg
            artifacts/UniviewCodeBuddyProxy-Windows-x64/UniviewCodeBuddyProxy-Windows-x64.zip
            artifacts/codebuddy-proxy-server-win-x64/codebuddy-proxy-server-win-x64.zip
            artifacts/codebuddy-proxy-server-linux-x64/codebuddy-proxy-server-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
