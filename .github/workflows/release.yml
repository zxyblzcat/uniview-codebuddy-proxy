name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS .app (ARM64)
        run: bash scripts/build-mac.sh arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniviewCodeBuddyProxy-macos-arm64
          path: 'UniviewCodeBuddyProxy.app'

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows resource
        working-directory: cmd/proxy
        run: go-winres make --arch amd64,arm64 --product-version git-tag --file-version git-tag

      - name: Build Windows .exe (AMD64)
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: |
          $VERSION = git describe --tags --always --dirty 2>$null; if (-not $VERSION) { $VERSION = "dev" }
          $COMMIT = git rev-parse --short HEAD 2>$null; if (-not $COMMIT) { $COMMIT = "none" }
          $DATE = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $LDFLAGS = "-s -w -H=windowsgui -X uniview-codebuddy-proxy/internal/version.Version=$VERSION -X uniview-codebuddy-proxy/internal/version.Commit=$COMMIT -X uniview-codebuddy-proxy/internal/version.Date=$DATE"
          go build -ldflags $LDFLAGS -o uniview-codebuddy-proxy.exe ./cmd/proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniviewCodeBuddyProxy-windows-amd64
          path: uniview-codebuddy-proxy.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux (AMD64)
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo none)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X uniview-codebuddy-proxy/internal/version.Version=${VERSION} -X uniview-codebuddy-proxy/internal/version.Commit=${COMMIT} -X uniview-codebuddy-proxy/internal/version.Date=${DATE}"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o uniview-codebuddy-proxy-linux-amd64 ./cmd/proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniviewCodeBuddyProxy-linux-amd64
          path: uniview-codebuddy-proxy-linux-amd64

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          # macOS: reassemble .app bundle (upload-artifact strips the top-level directory name)
          cd artifacts/UniviewCodeBuddyProxy-macos-arm64
          if [ ! -d "UniviewCodeBuddyProxy.app" ]; then
            mkdir UniviewCodeBuddyProxy.app
            shopt -s dotglob
            mv * UniviewCodeBuddyProxy.app/ 2>/dev/null || true
          fi
          # CI 管道可能丢失可执行权限，确保恢复（codesign 也需要可执行位）
          chmod +x "UniviewCodeBuddyProxy.app/Contents/MacOS/uniview-codebuddy-proxy"
          chmod +x "UniviewCodeBuddyProxy.app/Contents/Library/LoginItems/UniviewCodeBuddyProxy Helper.app/Contents/MacOS/uniview-codebuddy-proxy"
          zip -r ../../UniviewCodeBuddyProxy-macos-arm64.zip UniviewCodeBuddyProxy.app
          cd ../..

          # Windows .exe → zip
          cd artifacts/UniviewCodeBuddyProxy-windows-amd64
          zip ../../UniviewCodeBuddyProxy-windows-amd64.zip uniview-codebuddy-proxy.exe
          cd ../..

          # Linux binary → tar.gz
          cd artifacts/UniviewCodeBuddyProxy-linux-amd64
          tar czf ../../UniviewCodeBuddyProxy-linux-amd64.tar.gz uniview-codebuddy-proxy-linux-amd64
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            UniviewCodeBuddyProxy-macos-arm64.zip
            UniviewCodeBuddyProxy-windows-amd64.zip
            UniviewCodeBuddyProxy-linux-amd64.tar.gz
          generate_release_notes: true
