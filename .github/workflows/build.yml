name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/UniviewCodeBuddyProxy/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('macos/UniviewCodeBuddyProxy/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build for arm64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch arm64

      - name: Build for x86_64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        working-directory: macos/UniviewCodeBuddyProxy
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/UniviewCodeBuddyProxy \
            .build/x86_64-apple-macosx/release/UniviewCodeBuddyProxy \
            -output .build/universal/UniviewCodeBuddyProxy
          echo "✅ Universal binary created:"
          lipo -info .build/universal/UniviewCodeBuddyProxy

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore workloads
        working-directory: windows
        run: dotnet workload restore UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj

      - name: Install ProcDump for crash diagnostics
        shell: pwsh
        run: |
          choco install procdump -y
          # Accept Sysinternals license
          procdump -accepteula 2>$null
          Write-Host "ProcDump installed"

      - name: Build Core library
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy.Core/UniviewCodeBuddyProxy.Core.csproj -c Debug -p:Platform=x64

      - name: Build WinUI app (Debug) with crash diagnostics
        working-directory: windows
        shell: pwsh
        run: |
          # Set ProcDump as the post-mortem debugger for .NET Framework crashes
          # This will capture a dump when XamlCompiler.exe crashes
          $env:_NT_SYMBOL_PATH = "srv*C:\symbols*https://msdl.microsoft.com/download/symbols"

          # Run the build and capture the result
          dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Debug -p:Platform=x64 -v:detailed 2>&1 | Tee-Object -FilePath build-output.log
          $buildExit = $LASTEXITCODE

          if ($buildExit -ne 0) {
            Write-Host "=== Build FAILED ==="

            # Check if XamlCompiler produced any output
            $objDir = "UniviewCodeBuddyProxy/obj/x64/Debug/net8.0-windows10.0.19041.0"
            if (Test-Path "$objDir/input.json") {
              Write-Host "=== input.json XAML pages ==="
              $inputJson = Get-Content "$objDir/input.json" -Raw | ConvertFrom-Json
              $inputJson.XamlPages | ForEach-Object { Write-Host "  $($_.Source)" }
              Write-Host "=== input.json key fields ==="
              Write-Host "  ReferenceAssemblies count: $($inputJson.ReferenceAssemblies.Count)"
              Write-Host "  IsPass1: $($inputJson.IsPass1)"
              Write-Host "  Language: $($inputJson.Language)"
            }

            if (Test-Path "$objDir/output.json") {
              Write-Host "=== output.json ==="
              Get-Content "$objDir/output.json" | Write-Host
            } else {
              Write-Host "=== output.json NOT FOUND (XamlCompiler crashed before writing) ==="
            }

            # Try to run XamlCompiler.exe with ProcDump monitoring
            $sdkPath = (Get-ChildItem "C:\Users\runneradmin\.nuget\packages\microsoft.windowsappsdk\1.7.*" -Directory | Select-Object -First 1).FullName
            $xamlCompiler = Join-Path $sdkPath "tools\net472\XamlCompiler.exe"
            $inputJson = Join-Path (Resolve-Path $objDir) "input.json"
            $outputJson = Join-Path (Resolve-Path $objDir) "output.json"

            if ((Test-Path $xamlCompiler) -and (Test-Path $inputJson)) {
              Write-Host "=== Running XamlCompiler.exe under ProcDump ==="

              # Start ProcDump to monitor XamlCompiler.exe for crashes
              Start-Process -FilePath "procdump" -ArgumentList "-ma -e 1 -x C:\xamlcrash XamlCompiler.exe" -NoNewWindow -PassThru | Out-Null
              Start-Sleep -Seconds 1

              # Run XamlCompiler.exe
              try {
                $proc = Start-Process -FilePath $xamlCompiler -ArgumentList "`"$inputJson`"", "`"$outputJson`"" -Wait -PassThru -NoNewWindow -RedirectStandardError "xamlcompiler-stderr.txt" -RedirectStandardOutput "xamlcompiler-stdout.txt"
                Write-Host "XamlCompiler exit code: $($proc.ExitCode)"
              } catch {
                Write-Host "XamlCompiler failed to start: $_"
              }

              # Show stdout/stderr
              if (Test-Path "xamlcompiler-stdout.txt") {
                Write-Host "=== XamlCompiler stdout ==="
                Get-Content "xamlcompiler-stdout.txt" | Write-Host
              }
              if (Test-Path "xamlcompiler-stderr.txt") {
                Write-Host "=== XamlCompiler stderr ==="
                Get-Content "xamlcompiler-stderr.txt" | Write-Host
              }

              # Check for crash dump
              if (Test-Path "C:\xamlcrash") {
                Write-Host "=== Crash dump files ==="
                Get-ChildItem "C:\xamlcrash" | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)" }
              }

              # Check Windows Event Log for .NET Runtime errors
              Write-Host "=== .NET Runtime Event Log ==="
              try {
                Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='.NET Runtime'; Level=2} -MaxEvents 5 -ErrorAction SilentlyContinue | ForEach-Object {
                  Write-Host "$($_.TimeCreated): $($_.Message)"
                }
              } catch { Write-Host "(no .NET Runtime errors found)" }

              # Check Application Error events
              Write-Host "=== Application Error Events ==="
              try {
                Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='Application Error'; Level=2} -MaxEvents 5 -ErrorAction SilentlyContinue | ForEach-Object {
                  Write-Host "$($_.TimeCreated): $($_.Message)"
                }
              } catch { Write-Host "(no Application Error events)" }
            }

            exit $buildExit
          }

      - name: Build WinUI app (Release)
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Release -p:Platform=x64

      - name: Publish WinUI app
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj
          -c Release -p:Platform=x64
          -p:SelfContained=true -p:RuntimeIdentifier=win-x64
          -p:PublishSingleFile=false
          -p:WindowsAppSDKSelfContained=true

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = "windows/UniviewCodeBuddyProxy/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (Test-Path $publishDir) {
            Write-Host "✅ Publish output exists"
            Get-ChildItem $publishDir -Name | Select-Object -First 20
          } else {
            Write-Error "❌ Publish directory not found: $publishDir"
            exit 1
          }

      - name: Publish Server CLI (Windows)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r win-x64 --self-contained true

      - name: Publish Server CLI (Linux)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r linux-x64 --self-contained true

      - name: Upload crash diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xaml-crash-diagnostics
          path: |
            windows/build-output.log
            windows/xamlcompiler-stdout.txt
            windows/xamlcompiler-stderr.txt
            C:\xamlcrash\*
