name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/UniviewCodeBuddyProxy/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('macos/UniviewCodeBuddyProxy/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build for arm64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch arm64

      - name: Build for x86_64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        working-directory: macos/UniviewCodeBuddyProxy
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/UniviewCodeBuddyProxy \
            .build/x86_64-apple-macosx/release/UniviewCodeBuddyProxy \
            -output .build/universal/UniviewCodeBuddyProxy
          echo "✅ Universal binary created:"
          lipo -info .build/universal/UniviewCodeBuddyProxy

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore workloads
        working-directory: windows
        run: dotnet workload restore UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj

      - name: Setup crash diagnostics
        shell: pwsh
        run: |
          # Install ProcDump for crash dump capture
          choco install procdump -y
          # Accept Sysinternals EULA via registry
          New-ItemProperty -Path "HKCU:\Software\Sysinternals\ProcDump" -Name "EulaAccepted" -Value 1 -PropertyType DWORD -Force | Out-Null
          Write-Host "ProcDump installed and EULA accepted"

      - name: Build Core library
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy.Core/UniviewCodeBuddyProxy.Core.csproj -c Debug -p:Platform=x64

      - name: Build WinUI app (Debug) with crash diagnostics
        working-directory: windows
        shell: pwsh
        run: |
          # Set ProcDump as the AeDebug post-mortem debugger to capture .NET Framework crashes
          New-Item -Path "C:\xamlcrash" -ItemType Directory -Force | Out-Null
          procdump64.exe -ma -i C:\xamlcrash 2>&1 | Write-Host
          Write-Host "ProcDump registered as post-mortem debugger"

          # Run the build
          dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Debug -p:Platform=x64 2>&1 | Tee-Object -FilePath build-output.log
          $buildExit = $LASTEXITCODE

          if ($buildExit -ne 0) {
            Write-Host "=== Build FAILED ==="

            # Check for crash dump
            if (Test-Path "C:\xamlcrash") {
              $dumps = Get-ChildItem "C:\xamlcrash" -Filter "*.dmp"
              if ($dumps.Count -gt 0) {
                Write-Host "=== Crash dump files ==="
                $dumps | ForEach-Object { Write-Host "  $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)" }
              } else {
                Write-Host "No crash dumps found in C:\xamlcrash"
              }
            }

            # Check XamlCompiler input.json for diagnostics
            $objDir = "UniviewCodeBuddyProxy/obj/x64/Debug/net8.0-windows10.0.19041.0"
            if (Test-Path "$objDir/input.json") {
              $inputJson = Get-Content "$objDir/input.json" -Raw | ConvertFrom-Json
              Write-Host "=== input.json info ==="
              Write-Host "  XAML pages: $($inputJson.XamlPages.Count)"
              Write-Host "  Reference assemblies: $($inputJson.ReferenceAssemblies.Count)"
              Write-Host "  IsPass1: $($inputJson.IsPass1)"
              $inputJson.XamlPages | ForEach-Object { Write-Host "  Page: $($_.Source)" }
            }

            # Check Windows Event Log
            Write-Host "=== .NET Runtime errors ==="
            try {
              Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='.NET Runtime'; Level=2} -MaxEvents 5 -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "$($_.TimeCreated): $($_.Message)"
              }
            } catch { Write-Host "(none)" }

            Write-Host "=== Application Error events ==="
            try {
              Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='Application Error'; Level=2} -MaxEvents 5 -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "$($_.TimeCreated): $($_.Message)"
              }
            } catch { Write-Host "(none)" }

            # Try running XamlCompiler.exe directly for more info
            $sdkPath = (Get-ChildItem "C:\Users\runneradmin\.nuget\packages\microsoft.windowsappsdk\1.7.*" -Directory | Select-Object -First 1).FullName
            $xamlCompiler = Join-Path $sdkPath "tools\net472\XamlCompiler.exe"
            $inputJsonPath = Join-Path (Resolve-Path $objDir) "input.json"
            $outputJsonPath = Join-Path (Resolve-Path $objDir) "output.json"

            if ((Test-Path $xamlCompiler) -and (Test-Path $inputJsonPath)) {
              Write-Host "=== Direct XamlCompiler.exe run ==="
              try {
                $proc = Start-Process -FilePath $xamlCompiler -ArgumentList "`"$inputJsonPath`"", "`"$outputJsonPath`"" -Wait -PassThru -NoNewWindow -RedirectStandardError "xc-stderr.txt" -RedirectStandardOutput "xc-stdout.txt"
                Write-Host "Exit code: $($proc.ExitCode)"
                if (Test-Path "xc-stdout.txt") { Get-Content "xc-stdout.txt" | Write-Host }
                if (Test-Path "xc-stderr.txt") { Get-Content "xc-stderr.txt" | Write-Host }
              } catch {
                Write-Host "Failed: $_"
              }
            }

            # Unregister ProcDump as AeDebug
            procdump64.exe -u 2>&1 | Out-Null
            exit $buildExit
          }

          # Unregister ProcDump as AeDebug
          procdump64.exe -u 2>&1 | Out-Null

      - name: Build WinUI app (Release)
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Release -p:Platform=x64

      - name: Publish WinUI app
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj
          -c Release -p:Platform=x64
          -p:SelfContained=true -p:RuntimeIdentifier=win-x64
          -p:PublishSingleFile=false
          -p:WindowsAppSDKSelfContained=true

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = "windows/UniviewCodeBuddyProxy/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (Test-Path $publishDir) {
            Write-Host "✅ Publish output exists"
            Get-ChildItem $publishDir -Name | Select-Object -First 20
          } else {
            Write-Error "❌ Publish directory not found: $publishDir"
            exit 1
          }

      - name: Publish Server CLI (Windows)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r win-x64 --self-contained true

      - name: Publish Server CLI (Linux)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r linux-x64 --self-contained true
