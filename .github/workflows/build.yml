name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/UniviewCodeBuddyProxy/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('macos/UniviewCodeBuddyProxy/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build for arm64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch arm64

      - name: Build for x86_64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        working-directory: macos/UniviewCodeBuddyProxy
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/UniviewCodeBuddyProxy \
            .build/x86_64-apple-macosx/release/UniviewCodeBuddyProxy \
            -output .build/universal/UniviewCodeBuddyProxy
          echo "✅ Universal binary created:"
          lipo -info .build/universal/UniviewCodeBuddyProxy

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET SDK version
        run: dotnet --version

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore workloads
        working-directory: windows
        run: dotnet workload restore UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj

      - name: Build WinUI app (Release, diagnostic)
        working-directory: windows
        run: |
          dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Release -p:Platform=x64 -v diag 2>&1 | Out-File -FilePath build-diag.log -Encoding utf8
          $lastExit = $LASTEXITCODE
          Write-Host "Build exit code: $lastExit"
          if ($lastExit -ne 0) {
            Write-Host "=== XamlCompiler input.json ==="
            $inputJson = "UniviewCodeBuddyProxy/obj/x64/Release/net8.0-windows10.0.19041.0/input.json"
            if (Test-Path $inputJson) { Get-Content $inputJson } else { Write-Host "input.json not found" }
            Write-Host "=== XamlCompiler output.json ==="
            $outputJson = "UniviewCodeBuddyProxy/obj/x64/Release/net8.0-windows10.0.19041.0/output.json"
            if (Test-Path $outputJson) { Get-Content $outputJson } else { Write-Host "output.json not found" }
            Write-Host "=== XamlCompiler error log ==="
            $errLog = "UniviewCodeBuddyProxy/obj/x64/Release/net8.0-windows10.0.19041.0/XamlSaveStateFile.xml"
            if (Test-Path $errLog) { Get-Content $errLog } else { Write-Host "XamlSaveStateFile.xml not found" }
            Write-Host "=== Last 200 lines of build log ==="
            Get-Content build-diag.log -Tail 200
            exit $lastExit
          }

      - name: Publish WinUI app
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj
          -c Release -p:Platform=x64
          -p:SelfContained=true -p:RuntimeIdentifier=win-x64
          -p:PublishSingleFile=false
          -p:WindowsAppSDKSelfContained=true

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = "windows/UniviewCodeBuddyProxy/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (Test-Path $publishDir) {
            Write-Host "✅ Publish output exists"
            Get-ChildItem $publishDir -Name | Select-Object -First 20
          } else {
            Write-Error "❌ Publish directory not found: $publishDir"
            exit 1
          }

      - name: Publish Server CLI (Windows)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r win-x64 --self-contained true

      - name: Publish Server CLI (Linux)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r linux-x64 --self-contained true
