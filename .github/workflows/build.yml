name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/UniviewCodeBuddyProxy/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('macos/UniviewCodeBuddyProxy/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build for arm64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch arm64

      - name: Build for x86_64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        working-directory: macos/UniviewCodeBuddyProxy
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/UniviewCodeBuddyProxy \
            .build/x86_64-apple-macosx/release/UniviewCodeBuddyProxy \
            -output .build/universal/UniviewCodeBuddyProxy
          echo "✅ Universal binary created:"
          lipo -info .build/universal/UniviewCodeBuddyProxy

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify .NET SDK version
        run: dotnet --version

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore workloads
        working-directory: windows
        run: dotnet workload restore UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj

      - name: Build WinUI app (Debug first)
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Debug -p:Platform=x64

      - name: Build WinUI app (Release)
        working-directory: windows
        shell: pwsh
        run: |
          # Run build and capture output
          dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Release -p:Platform=x64 2>&1 | Tee-Object -FilePath build-output.log
          $buildExit = $LASTEXITCODE
          if ($buildExit -ne 0) {
            Write-Host "=== Build FAILED ==="
            # Try running XamlCompiler directly to capture its stderr
            $sdkPath = (Get-ChildItem "C:\Users\runneradmin\.nuget\packages\microsoft.windowsappsdk\1.5.*" -Directory | Select-Object -First 1).FullName
            $xamlCompiler = Join-Path $sdkPath "tools\net472\XamlCompiler.exe"
            $inputJson = "UniviewCodeBuddyProxy\obj\x64\Release\net8.0-windows10.0.19041.0\input.json"
            $outputJson = "UniviewCodeBuddyProxy\obj\x64\Release\net8.0-windows10.0.19041.0\output.json"
            if (Test-Path $xamlCompiler) {
              Write-Host "=== Running XamlCompiler directly ==="
              Write-Host "XamlCompiler: $xamlCompiler"
              Write-Host ".NET Framework version:"
              Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full" -ErrorAction SilentlyContinue | Select-Object Release, Version | Format-List
              try {
                $proc = Start-Process -FilePath $xamlCompiler -ArgumentList "`"$inputJson`"", "`"$outputJson`"" -Wait -PassThru -NoNewWindow -RedirectStandardError "xamlcompiler-stderr.txt" -RedirectStandardOutput "xamlcompiler-stdout.txt"
                Write-Host "Exit code: $($proc.ExitCode)"
                Write-Host "=== stdout ==="
                if (Test-Path "xamlcompiler-stdout.txt") { Get-Content "xamlcompiler-stdout.txt" } else { Write-Host "(empty)" }
                Write-Host "=== stderr ==="
                if (Test-Path "xamlcompiler-stderr.txt") { Get-Content "xamlcompiler-stderr.txt" } else { Write-Host "(empty)" }
              } catch {
                Write-Host "Failed to run XamlCompiler: $_"
              }
            }
            exit $buildExit
          }

      - name: Capture XamlCompiler diagnostics on failure
        if: failure()
        working-directory: windows
        shell: pwsh
        run: |
          # Try both Debug and Release obj directories
          $configs = @("Debug", "Release")
          foreach ($cfg in $configs) {
            $objDir = "UniviewCodeBuddyProxy/obj/x64/$cfg/net8.0-windows10.0.19041.0"
            if (Test-Path $objDir) {
              Write-Host "=== Found obj dir for $cfg ==="
              $diagFile = "xaml-diag-$cfg.txt"
              "=== XamlCompiler input.json (first 200 lines) ===" | Out-File $diagFile -Encoding utf8
              if (Test-Path "$objDir/input.json") { Get-Content "$objDir/input.json" -TotalCount 200 | Out-File $diagFile -Append -Encoding utf8 } else { "NOT FOUND" | Out-File $diagFile -Append -Encoding utf8 }
              "=== XamlCompiler output.json ===" | Out-File $diagFile -Append -Encoding utf8
              if (Test-Path "$objDir/output.json") { Get-Content "$objDir/output.json" | Out-File $diagFile -Append -Encoding utf8 } else { "NOT FOUND" | Out-File $diagFile -Append -Encoding utf8 }
              "=== obj dir listing ===" | Out-File $diagFile -Append -Encoding utf8
              Get-ChildItem "$objDir" -Recurse -Name | Select-Object -First 50 | Out-File $diagFile -Append -Encoding utf8
              Get-Content $diagFile
            }
          }

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xaml-diagnostics
          path: windows/xaml-diag.txt

      - name: Publish WinUI app
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj
          -c Release -p:Platform=x64
          -p:SelfContained=true -p:RuntimeIdentifier=win-x64
          -p:PublishSingleFile=false
          -p:WindowsAppSDKSelfContained=true

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = "windows/UniviewCodeBuddyProxy/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (Test-Path $publishDir) {
            Write-Host "✅ Publish output exists"
            Get-ChildItem $publishDir -Name | Select-Object -First 20
          } else {
            Write-Error "❌ Publish directory not found: $publishDir"
            exit 1
          }

      - name: Publish Server CLI (Windows)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r win-x64 --self-contained true

      - name: Publish Server CLI (Linux)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r linux-x64 --self-contained true
