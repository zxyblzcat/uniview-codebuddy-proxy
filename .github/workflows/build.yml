name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            macos/UniviewCodeBuddyProxy/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('macos/UniviewCodeBuddyProxy/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build for arm64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch arm64

      - name: Build for x86_64
        working-directory: macos/UniviewCodeBuddyProxy
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        working-directory: macos/UniviewCodeBuddyProxy
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/UniviewCodeBuddyProxy \
            .build/x86_64-apple-macosx/release/UniviewCodeBuddyProxy \
            -output .build/universal/UniviewCodeBuddyProxy
          echo "✅ Universal binary created:"
          lipo -info .build/universal/UniviewCodeBuddyProxy

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore workloads
        working-directory: windows
        run: dotnet workload restore UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj

      - name: Build WinUI app (first pass, continue on error)
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Release -p:Platform=x64
        continue-on-error: true

      - name: Run XamlCompiler manually to capture errors
        if: always()
        shell: pwsh
        run: |
          $objDir = "windows/UniviewCodeBuddyProxy/obj/x64/Release/net8.0-windows10.0.19041.0"
          $inputJson = Join-Path $objDir "input.json"
          $outputJson = Join-Path $objDir "output.json"

          # Find XamlCompiler.exe
          $sdkDir = Get-ChildItem "$env:USERPROFILE\.nuget\packages\microsoft.windowsappsdk" -Directory | Sort-Object -Descending | Select-Object -First 1
          $xamlCompiler = Join-Path $sdkDir.FullName "tools\net472\XamlCompiler.exe"

          if (Test-Path $xamlCompiler -and (Test-Path $inputJson)) {
            Write-Host "=== Running XamlCompiler manually ==="
            Write-Host "Input: $inputJson"
            Write-Host "Output: $outputJson"
            Write-Host "XamlCompiler: $xamlCompiler"

            $process = Start-Process -FilePath $xamlCompiler -ArgumentList "`"$inputJson`"", "`"$outputJson`"" -Wait -PassThru -NoNewWindow -RedirectStandardOutput "$objDir\xaml_stdout.txt" -RedirectStandardError "$objDir\xaml_stderr.txt"

            Write-Host "Exit code: $($process.ExitCode)"

            if (Test-Path "$objDir\xaml_stdout.txt") {
              Write-Host "=== STDOUT ==="
              Get-Content "$objDir\xaml_stdout.txt"
            }
            if (Test-Path "$objDir\xaml_stderr.txt") {
              Write-Host "=== STDERR ==="
              Get-Content "$objDir\xaml_stderr.txt"
            }
            if (Test-Path $outputJson) {
              Write-Host "=== output.json ==="
              Get-Content $outputJson
            }
          } else {
            Write-Host "XamlCompiler or input.json not found"
            Write-Host "SDK dir: $(if ($sdkDir) { $sdkDir.FullName } else { 'not found' })"
            Write-Host "input.json exists: $(Test-Path $inputJson)"
            Write-Host "XamlCompiler exists: $(Test-Path $xamlCompiler)"
          }

      - name: Build WinUI app (final)
        working-directory: windows
        run: dotnet build UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj -c Release -p:Platform=x64

      - name: Publish WinUI app
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy/UniviewCodeBuddyProxy.csproj
          -c Release -p:Platform=x64
          -p:SelfContained=true -p:RuntimeIdentifier=win-x64
          -p:PublishSingleFile=false
          -p:WindowsAppSDKSelfContained=true

      - name: Verify publish output
        shell: pwsh
        run: |
          $publishDir = "windows/UniviewCodeBuddyProxy/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (Test-Path $publishDir) {
            Write-Host "✅ Publish output exists"
            Get-ChildItem $publishDir -Name | Select-Object -First 20
          } else {
            Write-Error "❌ Publish directory not found: $publishDir"
            exit 1
          }

      - name: Publish Server CLI (Windows)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r win-x64 --self-contained true

      - name: Publish Server CLI (Linux)
        working-directory: windows
        run: >
          dotnet publish UniviewCodeBuddyProxy.Server/UniviewCodeBuddyProxy.Server.csproj
          -c Release -r linux-x64 --self-contained true
